name: 'Setup Rust Environment'
description: 'Installs Rust, caches Cargo dependencies, and optionally installs mise tools'
inputs:
  install-mise:
    description: 'Install mise and optional tools'
    required: false
    default: 'false'
  mise-version:
    description: 'mise version to install'
    required: false
    default: '2026.2.19'
  mise-tools:
    description: 'mise install arguments (space-separated, e.g., cargo:cargo-tarpaulin actionlint)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Rust toolchain
      run: rustup show active-toolchain
      shell: bash

    - name: Cache Cargo dependencies
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Setup mise with locked project tools
      if: inputs.install-mise == 'true' && inputs.mise-tools == ''
      uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      with:
        version: ${{ inputs.mise-version }}
        install_args: --locked

    - name: Setup mise with requested tools
      if: inputs.install-mise == 'true' && inputs.mise-tools != ''
      uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      with:
        version: ${{ inputs.mise-version }}
        install_args: --locked ${{ inputs.mise-tools }}
