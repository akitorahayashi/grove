name: Collect Coverage

on:
  workflow_call:

jobs:
  coverage:
    name: Run test coverage
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-mise: 'true'
          mise-tools: just cargo:cargo-tarpaulin

      - name: Reset tarpaulin runtime outputs
        run: |
          rm -rf target/tarpaulin
          rm -rf coverage
        shell: bash

      - name: Generate coverage
        # --all-targets is intentionally absent; tarpaulin runs its own test harness
        run: mise exec -- just coverage
        env:
          RUST_TEST_THREADS: 1
