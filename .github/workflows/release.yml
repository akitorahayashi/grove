# Binary Release Workflow
#
# Delegates tagged release builds to the reusable build workflow.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-version:
    name: Verify release version
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Match tag to package version
        run: bash scripts/verify-release-version.sh "${{ github.ref_name }}"

  static-checks:
    name: Static checks
    needs:
      - verify-version
    permissions:
      contents: read
    uses: ./.github/workflows/run-static-checks.yml

  tests:
    name: Tests
    needs:
      - verify-version
    permissions:
      contents: read
    uses: ./.github/workflows/run-tests.yml

  prepare-release:
    needs:
      - verify-version
      - static-checks
      - tests
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.prepare.outputs.release_id }}

    steps:
      - id: prepare
        uses: akitorahayashi/gh-release@v1
        with:
          mode: prepare
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
          create: true
          generate_notes: true

  build-and-upload:
    needs:
      - prepare-release
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      release_id: ${{ needs.prepare-release.outputs.release_id }}

  publish-release:
    needs:
      - prepare-release
      - build-and-upload
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: akitorahayashi/gh-release@v1
        with:
          mode: publish
          token: ${{ github.token }}
          release_id: ${{ needs.prepare-release.outputs.release_id }}
          publish: true
